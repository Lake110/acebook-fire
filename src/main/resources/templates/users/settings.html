<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acebook - Account Settings</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="d-flex justify-content-center mt-5">
    <div class="card p-4 mx-auto text-center shadow-sm settings-card">

    <h2 class="fw-bold mb-1">Account Settings</h2>
    <!--existing account iinfo -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">
                <i class="bi bi-person-circle me-2"></i>Account Info
            </h6>
            <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <span class="text-muted small">Email</span>
                <span th:text="${user.email}" class="fw-semibold small"></span>
            </div>
            <div class="d-flex justify-content-between align-items-center py-2">
                <span class="text-muted small">Username</span>
                <span th:text="${user.username}" class="fw-semibold small"></span>
            </div>
        </div>
    </div>

    <!--update username -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">
                <i class="bi bi-pencil me-2"></i>Username
            </h6>
            <form th:action="@{/users/settings/username}" method="post">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control"
                           th:value="${user.username}" placeholder="New username" required />
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Username</button>
            </form>
            <div th:if="${message}" th:text="${message}" class="mt-2 text-muted small text-center"></div>
        </div>
    </div>

    <!--update profile info -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-muted fw-semibold small mb-3">
                <i class="bi bi-file-person me-2"></i>Profile Information
            </h6>
            <form th:action="@{/users/settings/profile}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Bio</label>
                    <textarea name="bio" class="form-control" rows="3"
                              th:text="${user.bio}" placeholder="Tell people about yourself..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Birthday</label>
                    <input type="date" name="birthday" class="form-control"
                           th:value="${user.birthday}">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Relationship Status</label>
                    <select name="relationshipStatus" class="form-select">
                        <option value="">Select</option>
                        <option value="Single" th:selected="${user.relationshipStatus == 'Single'}">Single</option>
                        <option value="In a relationship" th:selected="${user.relationshipStatus == 'In a relationship'}">In a relationship</option>
                        <option value="Engaged" th:selected="${user.relationshipStatus == 'Engaged'}">Engaged</option>
                        <option value="Married" th:selected="${user.relationshipStatus == 'Married'}">Married</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Profile</button>
            </form>
            <div th:if="${message2}" th:text="${message2}" class="mt-2 text-muted small text-center"></div>
        </div>
    </div>

    <!--account deletion -->
    <div class="card border-0 shadow-sm mb-4 border-danger" style="border-left: 4px solid #dc3545 !important;">
        <div class="card-body px-4 py-3">
            <h6 class="text-uppercase text-danger fw-semibold small mb-1">
                <i class="bi bi-exclamation-triangle me-2"></i>Account Deletion
            </h6>
            <p class="text-muted small mb-3">This action is permanent and cannot be undone.</p>
            <form th:action="@{/users/settings/delete}" method="post">
                <button type="submit" class="btn btn-danger w-100"
                        onclick="return confirm('Are you sure? This will delete your account and all your posts.')">
                    Delete Account
                </button>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
