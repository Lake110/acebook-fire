<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acebook - Account Settings</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="d-flex justify-content-center mt-5">
    <div class="card p-4 mx-auto text-center shadow-sm settings-card">

        <h2 class="mb-4">Account Settings</h2>

        <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
        <p><strong>Username:</strong> <span th:text="${user.username}"></span></p>

        <hr class="my-4">
        <h5 class="mb-3">Update Username</h5>
        <form th:action="@{/users/settings/username}" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control text-center"
                       th:value="${user.username}" placeholder="New username" required />
            </div>
            <button type="submit" class="btn btn-primary w-100" id="liveToastBtn">Update Username</button>

        </form>
        <div th:if="${message}" th:text="${message}" class="mt-3 text-muted small"></div>
            <hr class="my-4">
            <h5 class="mb-3">Profile Information</h5>

            <form th:action="@{/users/settings/profile}" method="post">

                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    <textarea name="bio" class="form-control"
                              th:text="${user.bio}">Fill In Your Bio Here</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Birthday</label>
                    <input type="date" name="birthday" class="form-control"
                           th:value="${user.birthday}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Relationship Status</label>
                    <select name="relationshipStatus" class="form-control">
                        <option value="">Select</option>
                        <option value="Single" th:selected="${user.relationshipStatus == 'Single'}">Single</option>
                        <option value="In a relationship" th:selected="${user.relationshipStatus == 'In a relationship'}">In a relationship</option>
                        <option value="Engaged" th:selected="${user.relationshipStatus == 'Engaged'}">Engaged</option>
                        <option value="Married" th:selected="${user.relationshipStatus == 'Married'}">Married</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Update Profile
                </button>
            </form>
        <div th:if="${message2}" th:text="${message2}" class="mt-3 text-muted small"></div>


        <hr class="my-4">
        <h5 class="mb-3 text-danger">Account Deletion</h5>
        <form th:action="@{/users/settings/delete}" method="post">
            <button type="submit" id="delete-account-btn" class="btn btn-danger w-100"
                    onclick="return confirm('Are you sure? This will delete your account and all your posts.')">
                Delete Account
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
