<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acebook Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/main.css}" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="feed-wrapper">

    <!-- Profile card -->
    <div class="card p-4 mb-4 text-center">

        <img src="https://placehold.co/150x150"
             class="rounded-circle mb-3 profile-avatar"
             alt="Profile photo">

        <h3 class="mb-1" th:text="${user.username}">Username</h3>
        <p class="text-muted mb-2" th:text="${user.email}">email@example.com</p>

        <p class="mb-3">
            Bio: bio goes here blah blah blah
        </p>

        <div class="mb-3">
            <label class="form-label fw-semibold">Relationship status</label>
            <select class="form-select w-auto mx-auto">
                <option selected>Single</option>
                <option>In a relationship</option>
                <option>Engaged</option>
                <option>Married</option>
            </select>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <button class="btn btn-outline-secondary">
                <i class="bi bi-image"></i> Upload Photo
            </button>

            <a th:href="@{/settings}" class="btn btn-primary">
                <i class="bi bi-pencil-square me-1"></i> Edit Profile
            </a>
        </div>

    </div>

    <!-- User posts -->
    <h4 class="mb-3 fw-semibold">My Posts</h4>

    <div th:if="${#lists.isEmpty(posts)}" class="empty-state">
        <i class="bi bi-chat-left-text"></i>
        <p>You haven't posted anything yet.</p>
    </div>

    <div th:each="post : ${posts}" class="post-card">

        <div class="post-meta">
            <span class="post-author" th:text="${user.username}">Username</span>
        </div>

        <div class="post-content" th:text="${post.content}">
            Post content here
        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
