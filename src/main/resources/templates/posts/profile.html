<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acebook Profile</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <link th:href="@{/main.css}" rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container" style="max-width: 680px;">

    <div class="cover-photo"></div>

    <div class="card profile-header-card mb-3 px-4 pb-4 text-center">

        <div class="profile-avatar-wrap mx-auto mb-2">
            <img th:src="${user.avatarUrl}"
                 class="rounded-circle profile-avatar"
                 th:alt="${user.username}">
            <div th:if="${isOwnProfile}"
                 class="camera-overlay"
                 data-bs-toggle="modal"
                 data-bs-target="#avatarModal">
                <i class="bi bi-camera-fill text-white"></i>
            </div>
        </div>

        <h4 class="mb-0 fw-bold" th:text="${user.username}">Username</h4>
        <p class="text-muted small mb-3" th:text="${user.email}">email@example.com</p>

        <p class="text-secondary mb-3"
           th:text="${user.bio != null ? user.bio : 'No bio yet.'}">
        </p>

        <div class="d-flex justify-content-center mb-3 border rounded p-2">
            <div class="stat-box">
                <div class="stat-number" th:text="${#lists.size(posts)}">0</div>
                <div class="stat-label">Posts</div>
            </div>
            <div class="stat-box" style="cursor: pointer;"
                 data-bs-toggle="modal" data-bs-target="#friendsModal"
                 onmouseover="this.style.color='#0d6efd'; this.style.textDecoration='underline';"
                 onmouseout="this.style.color=''; this.style.textDecoration='';">
                <div class="stat-number" th:text="${#lists.size(friends)}">0</div>
                <div class="stat-label" th:text="${#lists.size(friends) == 1} ? 'Friend' : 'Friends'"></div>
            </div>
        </div>

        <div th:if="${isOwnProfile}" class="d-flex justify-content-center gap-2 mb-3">
            <a th:href="@{/settings}" class="btn btn-outline-secondary btn-sm px-4">
                <i class="bi bi-gear me-1"></i> Account Settings
            </a>
        </div>

        <div th:if="${!isOwnProfile and alreadyFriends == false}" class="d-flex justify-content-center gap-2 mb-3">

            <form th:action="@{/friends/add/{friendId}(friendId=${user.id})}" method="post">
                <button type="submit" class="btn btn-primary btn-sm px-4">
                    <i class="bi bi-person-plus me-1"></i> Add Friend
                </button>
            </form>
        </div>

        <!-- Relationship status — visible to all, editable only by owner -->
        <p class="text-secondary mb-2">
        <p class="text-secondary mb-2" th:if="${user.relationshipStatus}">
            <i class="bi bi-heart-fill text-danger me-1"></i>
            <span id="relationship-display"
                  th:text="${user.relationshipStatus != null ? user.relationshipStatus : 'Single'}">
            </span>
        </p>

        <p class="text-secondary mb-2" th:if="${user.birthday != null}">
            <i class="bi bi-cake-fill me-1"></i>
            Birthday: <span th:text="${#temporals.format(user.birthday, 'dd MMM yyyy')}"></span>
        </p>

        <div class="modal fade" id="editProfileModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Profile</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/profile/edit}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Bio</label>
                                <textarea class="form-control" name="bio" rows="3" th:text="${user.bio}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Relationship Status</label>
                                <select class="form-select" name="relationshipStatus">
                                    <option value="">-- Select --</option>
                                    <option value="Single" th:selected="${user.relationshipStatus == 'Single'}">Single</option>
                                    <option value="In a relationship" th:selected="${user.relationshipStatus == 'In a relationship'}">In a relationship</option>
                                    <option value="Engaged" th:selected="${user.relationshipStatus == 'Engaged'}">Engaged</option>
                                    <option value="Married" th:selected="${user.relationshipStatus == 'Married'}">Married</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal fade" id="friendsModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Friends</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div th:if="${#lists.isEmpty(friends)}" class="text-center text-muted py-3">
                            No friends yet.
                        </div>
                        <div th:each="friend : ${friends}" class="d-flex align-items-center gap-3 mb-3">
                            <a th:href="@{/profile/{id}(id=${friend.id})}">
                                <img th:src="${friend.avatarUrl}" th:alt="${friend.username}" class="avatar-feed"/>
                            </a>
                            <a th:href="@{/profile/{id}(id=${friend.id})}" th:text="${friend.username}" class="fw-bold text-decoration-none text-dark"></a>
                            <a th:href="@{/profile/{id}(id=${friend.id})}" class="btn btn-outline-primary btn-sm ms-auto">
                                View Profile
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="card px-4 py-3 mb-4">

        <h6 class="fw-bold text-muted text-uppercase mb-3 border-bottom pb-2"
            th:text="${isOwnProfile} ? 'My Posts' : ${user.username} + |'s Posts|">
            Posts
        </h6>

        <div th:if="${#lists.isEmpty(posts)}" class="text-center text-muted py-4">
            <i class="bi bi-chat-left-text fs-2 d-block mb-2"></i>
            <span th:text="${isOwnProfile} ? 'You haven\'t posted anything yet.' : 'No posts yet.'"></span>
        </div>

        <div th:each="post : ${posts}" class="post-card">
            <div class="post-meta">
                <span class="post-author" th:text="${user.username}">Username</span>
            </div>
            <div class="post-content" th:text="${post.content}">
                Post content here
            </div>
        </div>

    </div>

</div>

<!-- Avatar Picker Modal — only rendered for profile owner -->
<div th:if="${isOwnProfile}">
    <div class="modal fade" id="avatarModal" tabindex="-1" aria-labelledby="avatarModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="avatarModalLabel">Choose your avatar style</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{/profile/{id}/avatar(id=${user.id})}" method="post">
                    <div class="modal-body">
                        <div class="avatar-modal-grid">
                            <div th:each="style : ${avatarStyles}" class="avatar-option">
                                <label th:for="${style}">
                                    <input type="radio"
                                           name="avatarStyle"
                                           th:id="${style}"
                                           th:value="${style}"
                                           th:checked="${user.avatarStyle == style}"
                                           class="avatar-radio"/>
                                    <img th:src="'https://api.dicebear.com/9.x/' + ${style} + '/svg?seed=' + ${user.username}"
                                         th:alt="${style}"
                                         class="avatar-option-img"/>
                                    <p class="avatar-option-label" th:text="${style}"></p>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Avatar</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
