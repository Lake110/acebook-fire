<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acebook – Edit Post</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
  <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="feed-wrapper">

  <!-- Title card -->
  <div class="feed-title-card">
    <h1 class="feed-title">Edit Post</h1>
    <p class="feed-subtitle">Make your changes below</p>
  </div>

  <!-- Edit form card -->
  <div class="post-card">
    <form th:action="@{/posts/{id}(id=${post.id})}" th:object="${post}" method="post">

      <div class="mb-3">
                <textarea th:field="*{content}"
                          class="form-control edit-textarea"
                          placeholder="What's on your mind?"
                          rows="5"></textarea>
      </div>

      <div class="post-actions">
        <a th:href="@{/}" class="btn btn-outline-secondary btn-sm px-3">
          <i class="bi bi-x me-1"></i>Cancel
        </a>
        <button type="submit" class="btn btn-primary btn-sm px-3">
          <i class="bi bi-check me-1"></i>Update Post
        </button>
      </div>

    </form>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
