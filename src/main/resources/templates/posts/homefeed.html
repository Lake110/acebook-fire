<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acebook</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <link th:href="main.css" rel="stylesheet">
</head>
<body>
<div id="top"></div>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="feed-wrapper">

    <!-- Title card -->
    <div class="feed-title-card">
        <h1 class="feed-title">Acebook</h1>
        <p class="feed-subtitle">See what your friends are up to</p>
    </div>

    <!-- Post button -->
    <div class="feed-post-btn-bar justify-content-center">
        <a th:href="@{/posts}" class="btn btn-primary px-5">
            <i class="bi bi-pencil-square me-2"></i>Make a Post
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(posts)}" class="empty-state">
        <i class="bi bi-chat-square-text"></i>
        <p>No posts yet. Be the first to share something!</p>
    </div>

    <!-- Post cards -->
    <div th:each="post : ${posts}" class="post-card" th:id="'post-' + ${post.id}"
         th:attr="data-bs-toggle='modal', data-bs-target='#postModal-' + ${post.id}"
         style="cursor:pointer;">

        <!-- author + date -->
        <div class="post-meta d-flex align-items-center gap-2">
            <!-- Avatar icon linking to the user's profile -->
            <a th:href="@{/profile/{id}(id=${post.user?.id})}" onclick="event.stopPropagation()">
                <img th:src="${post.user?.avatarUrl}"
                     th:alt="${post.user?.username}"
                     class="avatar-feed"/>
            </a>
            <div>
                <a th:href="@{/profile/{id}(id=${post.user?.id})}"
                   class="post-author"
                   th:text="${post.user?.username}"
                   onclick="event.stopPropagation()"></a>
                <span th:text="
                    'Posted on ' +
                    ${#temporals.format(post.createdAt, 'dd MMM yyyy')}
                    + ' @ '
                    + ${#temporals.format(post.createdAt, 'HH:mm')}">
                </span>
                <span th:if="${post.updatedAt}">(edited)</span>
            </div>
        </div>

        <!-- Content -->
        <p class="post-content" th:text="${post.content}"></p>

        <!-- Actions -->
        <div class="post-actions"
             th:if="${#authentication.principal.attributes['email'] == post.user.email}"
             onclick="event.stopPropagation()">

            <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="get" class="m-0">
                <button type="submit" class="btn btn-primary btn-sm px-3">Edit</button>
            </form>
            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="m-0">
                <button type="submit" class="btn btn-danger btn-sm px-3">Delete</button>
            </form>
        </div>
            <span th:text="${@likeRepository.countByPost(post)} + ' likes'">0</span>
        </form>

        <!-- Post modal -->
        <div class="modal fade"
             th:id="'postModal-' + ${post.id}"
             tabindex="-1"
             aria-hidden="true">

            <div class="modal-dialog modal-lg modal-dialog-centered" onclick="event.stopPropagation()">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" th:text="${post.user?.username} + '\'s post'">Post</h5>
                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>

                    <div class="modal-body">

                        <div class="post-meta d-flex align-items-center gap-2 mb-3">
                            <a th:href="@{/profile/{id}(id=${post.user?.id})}">
                                <img th:src="${post.user?.avatarUrl}"
                                     th:alt="${post.user?.username}"
                                     class="avatar-feed"/>
                            </a>
                            <div>
                                <a th:href="@{/profile/{id}(id=${post.user?.id})}"
                                   class="post-author"
                                   th:text="${post.user?.username}"></a>
                                <span th:text="
                                    'Posted on ' +
                                    ${#temporals.format(post.createdAt, 'dd MMM yyyy')}
                                    + ' @ '
                                    + ${#temporals.format(post.createdAt, 'HH:mm')}">
                                </span>
                                <span th:if="${post.updatedAt}">(edited)</span>
                            </div>
                        </div>

                        <p class="post-content" th:text="${post.content}"></p>

                    </div>

                </div>
            </div>
        </div>
<!--        Like Button Section-->
        <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post" class="m-0 mt-2">
            <button type="submit"
                    th:classappend="${@likeRepository.existsByUserEmailAndPost(#authentication.principal.attributes['email'], post)} ? 'liked'"
                    class="like-btn">
                <i class="fa-heart"
                   th:classappend="${@likeRepository.existsByUserEmailAndPost(#authentication.principal.attributes['email'], post)} ? 'fa-solid' : 'fa-regular'"></i>
                <span th:text="${@likeRepository.countByPost(post)}">0</span>
                <span th:text="${@likeRepository.countByPost(post) > 1} ? 'Likes' : 'Like'">Like</span>
            </button>
        </form>
    </div>

    <!-- Back to top -->
    <div class="feed-post-btn-bar justify-content-center">
        <a href="#top" class="btn btn-primary px-5">Back to Top</a>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
