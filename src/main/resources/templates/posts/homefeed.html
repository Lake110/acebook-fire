<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Acebook</title>
    <link rel="stylesheet" href="/main.css">
</head>
<body>
<div class="posts">
    <div th:each="post : ${posts}" class="post-main">
        <p th:text="${post.content}"></p>
    </div>

    <a href="/posts" type="button">Make a Post</a>
</div>
</body>
</html>
