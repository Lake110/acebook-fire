<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acebook</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <link th:href="main.css" rel="stylesheet">
</head>
<body>
<div id="top"></div>
<div th:replace="fragments/navbar :: navbar"></div>


<div class="feed-wrapper">

    <!-- Title card -->
    <div class="feed-title-card">
        <h1 class="feed-title">Acebook</h1>
        <p class="feed-subtitle">See what your friends are up to</p>
    </div>

    <!-- Post button -->
    <div class="feed-post-btn-bar justify-content-center">
        <a th:href="@{/posts}" class="btn btn-primary px-5">
            <i class="bi bi-pencil-square me-2"></i>Make a Post
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(posts)}" class="empty-state">
        <i class="bi bi-chat-square-text"></i>
        <p>No posts yet. Be the first to share something!</p>
    </div>

    <!-- Post cards -->
    <div th:each="post : ${posts}" class="post-card">

        <!-- author + date -->
        <div class="post-meta d-flex align-items-center gap-2">
            <!-- Avatar icon linking to the user's profile -->
            <a th:href="@{/profile/{id}(id=${post.user?.id})}">
                <img th:src="${post.user?.avatarUrl}"
                     th:alt="${post.user?.username}"
                     class="avatar-feed"/>
            </a>
            <div>
                <a th:href="@{/profile/{id}(id=${post.user?.id})}"
                   class="post-author"
                   th:text="${post.user?.username}"></a>
                <span th:if="${post.user?.birthday != null and post.user?.isBirthday()}">🎉</span>
                <span th:text="
                    'Posted on ' +
                    ${#temporals.format(post.createdAt, 'dd MMM yyyy')}
                    + ' @ '
                    + ${#temporals.format(post.createdAt, 'HH:mm')}">
                </span>
                <span th:if="${post.updatedAt}">(edited)</span>
            </div>
        </div>

        <!-- Content -->
        <p class="post-content" th:text="${post.content}"></p>

        <!-- Actions -->
        <div class="post-actions" th:if="${#authentication.principal.attributes['email'] == post.user.email}">

            <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="get" class="m-0">
                <button type="submit" class="btn btn-primary btn-sm px-3">Edit</button>
            </form>
            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="m-0">
                <button type="submit" class="btn btn-danger btn-sm px-3">Delete</button>
            </form>
        </div>
        <!-- Comment toggle + count -->
        <div class="mt-3">
            <button class="btn btn-outline-secondary btn-sm"
                    type="button"
                    data-bs-toggle="collapse"
                    th:data-bs-target="'#comments-' + ${post.id}"
                    aria-expanded="false"
                    th:aria-controls="'comments-' + ${post.id}">
                <span th:text="${#lists.size(post.comments)} + (${#lists.size(post.comments) == 1} ? ' comment' : ' comments')"></span>
            </button>
        </div>

        <!-- Collapsible comments section -->
        <div class="collapse mt-3" th:id="'comments-' + ${post.id}">

            <!-- Existing comments -->
            <div th:if="${!#lists.isEmpty(post.comments)}">
                <div th:each="comment : ${post.comments}" class="border rounded p-2 mb-2 bg-light">

                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <strong th:text="${comment.user.username}"></strong>
                            <span th:if="${comment.user.birthday != null and comment.user.isBirthday()}">🎉</span>
                            <small class="text-muted ms-2"
                                   th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy HH:mm')}"></small>
                        </div>

                        <form th:if="${#authentication.principal.attributes['email'] == comment.user.email}"
                              th:action="@{/comments/{id}/delete(id=${comment.id})}"
                              method="post"
                              class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </div>

                    <p class="mb-0 mt-2" th:text="${comment.content}"></p>
                </div>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(post.comments)}" class="text-muted small mb-2">
                No comments yet.
            </div>

            <!-- Add comment form -->
            <form th:action="@{/posts/{postId}/comments(postId=${post.id})}" method="post" class="mt-2">
                <div class="mb-2">
            <textarea name="content"
                      class="form-control"
                      rows="2"
                      placeholder="Write a comment..."
                      required></textarea>
                </div>
                <button type="submit" class="btn btn-sm btn-primary">Add Comment</button>
            </form>
        </div>
        <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post" class="m-0">
            <button type="submit" class="btn btn-primary btn-sm px-3"><i class="fa-regular fa-heart"></i> Like</button>
            <span th:text="${@likeRepository.countByPost(post)} + ' likes'">0</span>
        </form>
    </div>
    <!-- Post button -->
    <div class="feed-post-btn-bar justify-content-center">
        <a href="#top" class="btn btn-primary px-5">Back to Top</a>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
