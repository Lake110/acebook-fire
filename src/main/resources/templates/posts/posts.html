<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head lang="en">
    <meta charset="UTF-8"/>
    <title>Acebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="d-flex justify-content-center mt-5">
    <div class="card p-4 shadow-sm text-center posts-card" style="max-width: 600px; width: 100%;">

        <h1 class="mb-2">Posts</h1>

        <div sec:authorize="isAuthenticated()" class="text-muted mb-3 small">
            Signed in as <span sec:authentication="principal.attributes['email']"></span>
        </div>

        <form action="#" th:action="@{/posts}" th:object="${post}" method="post">
            <div class="mb-3">
                <textarea class="form-control" id="content" th:field="*{content}" rows="4"
                          placeholder="What's on your mind?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Post</button>
        </form>

        <div th:if="${message}" th:text="${message}" class="mt-3 text-muted small"></div>

        <hr class="my-4">
        <a href="/" class="btn btn-outline-secondary w-100">Back to Feed</a>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
